name: security-auth-tests

on:
  pull_request:
    branches: [ "master", "main" ]
  push:
    branches: [ "master", "main" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      # بهتر: از GitHub Secrets بخون
      JWT_SIGNING_KEY: ${{ secrets.JWT_SIGNING_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          # اگر .NET 10 روی runner هنوز preview بود:
          # include-prerelease: true

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test SecurityTests
        run: dotnet test Tests/BonyadRazi.Portal.SecurityTests/BonyadRazi.Portal.SecurityTests.csproj -c Release --no-build --logger "trx;LogFileName=security-auth-tests.trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-auth-tests
          path: TestResults